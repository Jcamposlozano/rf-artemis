behaviors:
  ShipBehavior:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024
      buffer_size: 20480
      learning_rate: 5.0e-5
      beta: 7.5e-4
      epsilon: 0.08
      lambd: 0.95
      num_epoch: 2
      learning_rate_schedule: constant

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.997
        strength: 1.0

    max_steps: 400000
    time_horizon: 256
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 5